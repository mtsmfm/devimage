# L4 forwarder for the devimage `ingress` sidecar (compose.throttle.yml).
# Devimage sits on the `internal: true` bridge with no port publishing,
# so HAProxy fronts the host-side ports and forwards into devimage:
#   8080 — Selkies HTTP/WebSocket signaling
#   3478 — embedded coturn (TURN over TCP, single port)

defaults
  mode tcp
  timeout connect 5s
  timeout client  1h
  timeout server  1h

frontend selkies
  bind *:8080
  default_backend selkies_be
backend selkies_be
  server devimage devimage:8080

frontend turn
  bind *:3478
  default_backend turn_be
backend turn_be
  server devimage devimage:3478

# General-purpose dev ports. Bind a range, omit the port on the `server`
# line, and HAProxy preserves dst_port end-to-end — so devimage's
# :18000 surfaces on host's :18000, :18007 → :18007, etc. Pick a port
# in this range when you bring up an ad-hoc dev service inside the
# container; no compose / haproxy edit needed. Range chosen to avoid
# popular dev defaults (3000s/5000s/8000s) and TURN's UDP relay
# (49152-65535). Extend by widening the bind range and adding to the
# `ports:` list in compose.throttle.yml.
frontend devports
  bind *:18000-18009
  default_backend devports_be
backend devports_be
  server devimage devimage
